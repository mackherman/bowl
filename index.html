<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animal Farm Park Interface</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background-color: #f2f2f2;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-bottom: 20px;
    }
    iframe {
      width: 48%;
      height: 400px;
      border: 1px solid #ccc;
      margin-right: 2%;
    }
    .iframe-container {
      display: flex;
      gap: 2%;
    }
  </style>
</head>
<body>

  <h1>Welcome to the Animal Farm Park Interface</h1>

  <!-- Button to open a file or page -->
  <button onclick="window.open('your-file.html', '_blank')">Open Site File</button>

  <!-- Two Iframes -->
  <div class="iframe-container">
    <iframe src="https://example.com/page1" title="Frame 1"></iframe>
    <iframe src="https://example.com/page2" title="Frame 2"></iframe>
  </div>

</body>
</html>
